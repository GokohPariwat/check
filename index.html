พญาไท,38,นางสาวมัญชรี ทีปนะ,จ.ส.ต.วรวุธ  กันทะวา ,ส.ต.ต.ชนม์สวัสดิ์ พิมพิบาล,,,,
พญาไท,39,นางสาวปนัดดา ย่องมณี,ส.ต.ท.ศุภกร พรมเมืองคุก ,ส.ต.ต.พงศ์พล กมลวรรณเลิศ,,,,
พญาไท,40,นางสาววราภรณ์ แสงมูล,จ.ส.ต.จักรพงศ์  ตีบไธสง ,ส.ต.ต.ธนาธิป สุขุมานันท์,,,,

        let appState = { officers: [], attendance: {} };

        function init() {
            parseData();
            lucide.createIcons();
            fetchDataFromSheet();
            
            // รีเฟรชข้อมูลแบบต่อเนื่องทุก 3.5 วินาที
            setInterval(fetchDataFromSheet, 3500);
        }

        function parseData() {
            const lines = csvData.trim().split('\n');
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = line.split(',');
                const district = cols[0] ? cols[0].trim() : '';
                const unit = cols[1] ? cols[1].trim() : '';
                
                if (district && unit) {
                    let totalMembers = 0;
                    if(cols[2]) totalMembers++; // ประธาน
                    if(cols[3]) totalMembers++; // รปภ.1
                    if(cols[4]) totalMembers++; // รปภ.2

                    appState.officers.push({
                        id: `${district}-${unit}`,
                        district: district,
                        unit: parseInt(unit),
                        hasP: !!cols[2],
                        hasS1: !!cols[3],
                        hasS2: !!cols[4],
                        totalMembers: totalMembers
                    });
                }
            }
        }

        async function fetchDataFromSheet() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                let isChanged = false;
                Object.keys(data).forEach(key => {
                    const status = (data[key] === true || data[key] === "true");
                    if(appState.attendance[key] !== status) {
                        appState.attendance[key] = status;
                        isChanged = true;
                    }
                });
                
                if(isChanged || document.getElementById('grid-samsen').innerHTML === '') {
                    renderDashboard();
                }
            } catch (error) {
                console.error("Connection Error:", error);
            }
        }

        function renderDashboard() {
            const gridSamsen = document.getElementById('grid-samsen');
            const gridPhayathai = document.getElementById('grid-phayathai');
            
            let htmlSamsen = '';
            let htmlPhayathai = '';

            let totalSamsenComplete = 0;
            let totalPhayathaiComplete = 0;
            let totalComplete = 0;

            appState.officers.forEach(item => {
                let checkedCount = 0;
                const pChecked = appState.attendance[`${item.id}-p`];
                const s1Checked = appState.attendance[`${item.id}-s1`];
                const s2Checked = appState.attendance[`${item.id}-s2`];

                if (item.hasP && pChecked) checkedCount++;
                if (item.hasS1 && s1Checked) checkedCount++;
                if (item.hasS2 && s2Checked) checkedCount++;

                const isEmpty = (checkedCount === 0);
                const isComplete = (item.totalMembers > 0 && checkedCount === item.totalMembers);
                const isPartial = (!isEmpty && !isComplete);
                
                if (isComplete) {
                    totalComplete++;
                    if (item.district === 'สามเสนใน') totalSamsenComplete++;
                    else totalPhayathaiComplete++;
                }

                // สไตล์ของกล่อง 3 ระดับ
                let boxClass = 'bg-white border-gray-200 shadow-sm'; // ขาว (ยังไม่มา)
                let textUnitClass = 'text-gray-500';

                if (isComplete) {
                    boxClass = 'bg-emerald-500 border-emerald-600 shadow-md transform scale-[1.03] transition-transform'; // เขียว (ครบ)
                    textUnitClass = 'text-white drop-shadow-sm';
                } else if (isPartial) {
                    boxClass = 'bg-amber-100 border-amber-300 shadow-md'; // เหลือง (มาบ้าง)
                    textUnitClass = 'text-amber-800';
                }

                const renderIndicator = (name, hasPerson, isPersonChecked) => {
                    if (!hasPerson) return '';
                    
                    let dotClass = '';
                    if (isComplete) {
                        dotClass = 'bg-white text-emerald-600 font-extrabold shadow-sm';
                    } else {
                        // เปลี่ยนสีจุดให้เป็นสีม่วงอ่อนๆ จะได้ไม่ฉูดฉาดเวลาคนยังไม่มา
                        dotClass = isPersonChecked 
                            ? 'bg-emerald-500 text-white font-bold shadow-sm' 
                            : 'bg-purple-100 text-purple-500 border border-purple-200';
                    }

                    // ปรับรูปแบบจากวงกลม เป็นแบบแคปซูล (Pill) เพื่อรองรับตัวหนังสือยาวขึ้น เช่น "รปภ.1"
                    return `
                        <div class="px-1.5 h-4 md:h-[18px] rounded-full flex items-center justify-center text-[8px] md:text-[9px] whitespace-nowrap ${dotClass}">
                            ${name}
                        </div>
                    `;
                };

                const boxHtml = `
                    <div class="flex flex-col items-center justify-center p-1 md:p-1.5 rounded-lg border h-full overflow-hidden ${boxClass}">
                        <span class="text-[9px] md:text-xs font-bold mb-0.5 md:mb-1 tracking-tight ${textUnitClass}">หน่วย ${item.unit}</span>
                        <div class="flex gap-1 flex-wrap justify-center w-full">
                            ${renderIndicator('ปธ.', item.hasP, pChecked)}
                            ${renderIndicator('รปภ.1', item.hasS1, s1Checked)}
                            ${renderIndicator('รปภ.2', item.hasS2, s2Checked)}
                        </div>
                    </div>
                `;

                if (item.district === 'สามเสนใน') {
                    htmlSamsen += boxHtml;
                } else {
                    htmlPhayathai += boxHtml;
                }
            });

            gridSamsen.innerHTML = htmlSamsen;
            gridPhayathai.innerHTML = htmlPhayathai;

            document.getElementById('stat-samsen').textContent = `${totalSamsenComplete} / 38`;
            document.getElementById('stat-phayathai').textContent = `${totalPhayathaiComplete} / 42`;
            document.getElementById('arrived-count').textContent = totalComplete;
        }

        window.onload = init;
    </script>
