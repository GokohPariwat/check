        let appState = {
            officers: [],
            attendance: {}
        };

        function init() {
            parseData();
            lucide.createIcons();
            fetchDataFromSheet();
            
            // ตั้งเวลาดึงข้อมูลใหม่ทุกๆ 10 วินาที
            setInterval(fetchDataFromSheet, 10000);
        }

        function parseData() {
            const lines = csvData.trim().split('\n');
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = line.split(',');
                const district = cols[0] ? cols[0].trim() : '';
                const unit = cols[1] ? cols[1].trim() : '';
                
                if (district && unit) {
                    let totalMembers = 0;
                    if(cols[2]) totalMembers++; // ป
                    if(cols[3]) totalMembers++; // ร1
                    if(cols[4]) totalMembers++; // ร2

                    appState.officers.push({
                        id: `${district}-${unit}`,
                        district: district,
                        unit: parseInt(unit),
                        hasP: !!cols[2],
                        hasS1: !!cols[3],
                        hasS2: !!cols[4],
                        totalMembers: totalMembers
                    });
                }
            }
        }

        async function fetchDataFromSheet() {
            const syncEl = document.getElementById('sync-status');
            syncEl.classList.remove('hidden');
            
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                Object.keys(data).forEach(key => {
                    appState.attendance[key] = (data[key] === true || data[key] === "true");
                });
                
                renderDashboard();
            } catch (error) {
                console.error("Error fetching data:", error);
            }
            
            setTimeout(() => syncEl.classList.add('hidden'), 500); 
        }

        function renderDashboard() {
            const gridSamsen = document.getElementById('grid-samsen');
            const gridPhayathai = document.getElementById('grid-phayathai');
            
            gridSamsen.innerHTML = '';
            gridPhayathai.innerHTML = '';

            let totalSamsenComplete = 0;
            let totalPhayathaiComplete = 0;
            let totalComplete = 0;

            appState.officers.forEach(item => {
                let checkedCount = 0;
                const pChecked = appState.attendance[`${item.id}-p`];
                const s1Checked = appState.attendance[`${item.id}-s1`];
                const s2Checked = appState.attendance[`${item.id}-s2`];

                if (item.hasP && pChecked) checkedCount++;
                if (item.hasS1 && s1Checked) checkedCount++;
                if (item.hasS2 && s2Checked) checkedCount++;

                // เช็คสถานะ 3 ระดับ
                const isEmpty = (checkedCount === 0);
                const isComplete = (item.totalMembers > 0 && checkedCount === item.totalMembers);
                const isPartial = (!isEmpty && !isComplete); // มาบ้างแต่ไม่ครบ (สีเหลือง)
                
                if (isComplete) {
                    totalComplete++;
                    if (item.district === 'สามเสนใน') totalSamsenComplete++;
                    else totalPhayathaiComplete++;
                }

                // กำหนดสีกล่อง
                let boxClass = 'bg-white border-gray-300 shadow-sm transition-all'; // Default (ยังไม่มีใครมา)
                let textUnitClass = 'text-gray-700';

                if (isComplete) {
                    boxClass = 'bg-emerald-500 border-emerald-600 shadow-md transform scale-[1.02] transition-all';
                    textUnitClass = 'text-white';
                } else if (isPartial) {
                    boxClass = 'bg-yellow-300 border-yellow-400 shadow-md transition-all';
                    textUnitClass = 'text-yellow-900';
                }

                // ฟังก์ชันช่วยวาดวงกลมบอกสถานะ
                const renderIndicator = (name, hasPerson, isPersonChecked) => {
                    if (!hasPerson) return '';
                    
                    let dotClass = '';
                    if (isComplete) {
                        // ถ้ามาครบแล้วทั้งหน่วย จุดจะเป็นสีขาวตัวหนังสือเขียว กลืนกับกล่อง
                        dotClass = 'bg-white text-emerald-600 border-white';
                    } else {
                        // สำหรับกล่องขาว และ กล่องเหลือง จุดจะบอกสถานะจริง (แดง=ยังไม่มา, เขียว=มาแล้ว)
                        dotClass = isPersonChecked 
                            ? 'bg-emerald-500 text-white border-emerald-600' 
                            : 'bg-red-500 text-white border-red-600';
                    }

                    return `
                        <div class="flex flex-col items-center justify-center">
                            <div class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold border ${dotClass}" title="${name}">
                                ${name}
                            </div>
                        </div>
                    `;
                };

                const boxHtml = `
                    <div class="flex flex-col items-center justify-center p-2 rounded-lg border ${boxClass} min-h-[80px]">
                        <span class="text-xs font-bold mb-2 ${textUnitClass}">หน่วย ${item.unit}</span>
                        <div class="flex gap-1.5">
                            ${renderIndicator('ป.', item.hasP, pChecked)}
                            ${renderIndicator('ร.1', item.hasS1, s1Checked)}
                            ${renderIndicator('ร.2', item.hasS2, s2Checked)}
                        </div>
                    </div>
                `;

                if (item.district === 'สามเสนใน') {
                    gridSamsen.insertAdjacentHTML('beforeend', boxHtml);
                } else {
                    gridPhayathai.insertAdjacentHTML('beforeend', boxHtml);
                }
            });

            // อัปเดตตัวเลข
            document.getElementById('stat-samsen').textContent = `${totalSamsenComplete} / 38`;
            document.getElementById('stat-phayathai').textContent = `${totalPhayathaiComplete} / 42`;
            document.getElementById('arrived-count').textContent = totalComplete;
        }

        window.onload = init;
    </script>
</body>
</html>
