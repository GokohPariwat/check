        let appState = {
            officers: [],
            attendance: {}, 
            isAdmin: false,
            totalUnits: 0,
            samsenTotalUnits: 0,
            phayathaiTotalUnits: 0
        };

        function init() {
            parseData();
            loadLocalStorage();
            lucide.createIcons();
            renderAll();
        }

        function parseData() {
            const lines = csvData.trim().split('\n');
            let sUnits = 0;
            let pUnits = 0;
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = line.split(',');
                const district = cols[0] ? cols[0].trim() : '';
                const unit = cols[1] ? cols[1].trim() : '';
                
                if (district && unit) {
                    const unitId = `${district}-${unit}`;
                    const pName = cols[2] ? cols[2].trim() : '';
                    const s1Name = cols[3] ? cols[3].trim() : '';
                    const s2Name = cols[4] ? cols[4].trim() : '';

                    let unitTotal = 0;
                    if(pName) unitTotal++;
                    if(s1Name) unitTotal++;
                    if(s2Name) unitTotal++;

                    if(district === 'สามเสนใน') sUnits++;
                    if(district === 'พญาไท') pUnits++;

                    appState.officers.push({
                        id: unitId,
                        district,
                        unit: parseInt(unit),
                        president: pName,
                        sec1: s1Name,
                        sec2: s2Name,
                        totalMembers: unitTotal
                    });
                }
            }
            appState.samsenTotalUnits = sUnits;
            appState.phayathaiTotalUnits = pUnits;
            appState.totalUnits = sUnits + pUnits;
        }

        function loadLocalStorage() {
            const saved = localStorage.getItem('election_attendance_data');
            if (saved) {
                appState.attendance = JSON.parse(saved);
            }
            updateStats();
        }

        function saveLocalStorage() {
            localStorage.setItem('election_attendance_data', JSON.stringify(appState.attendance));
            updateStats();
        }

        function createCheckboxHTML(item, roleCode, name, allChecked) {
            if(!name) return '<div class="flex-1"></div>'; // Empty space to keep layout aligned
            
            const personId = `${item.id}-${roleCode}`;
            const isChecked = appState.attendance[personId] === true;
            const disabledAttr = appState.isAdmin ? '' : 'disabled';
            const cursorClass = appState.isAdmin ? 'cursor-pointer hover:opacity-80' : 'cursor-default';
            
            // สีของตัวอักษร: ถ้าครบทุกคนในแถว=ขาว, ถ้าติ๊ก=เขียว, ถ้ายังไม่ติ๊ก=เทา
            let textClass = 'text-gray-600';
            if (allChecked) textClass = 'text-white font-medium';
            else if (isChecked) textClass = 'text-emerald-600 font-bold';

            return `
                <label class="flex-1 flex items-center gap-1 overflow-hidden ${cursorClass}" title="${name}">
                    <input type="checkbox" class="shrink-0 w-3 h-3 md:w-3.5 md:h-3.5 rounded border-gray-300 focus:ring-0 ${appState.isAdmin ? 'cursor-pointer' : ''}" 
                        ${isChecked ? 'checked' : ''} 
                        ${disabledAttr}
                        onchange="toggleAttendance('${personId}', this.checked)">
                    <span class="truncate text-[10px] md:text-xs xl:text-sm ${textClass} leading-tight">${name}</span>
                </label>
            `;
        }

        function renderAll() {
            const containerSamsen = document.getElementById('list-samsen');
            const containerPhayathai = document.getElementById('list-phayathai');
            
            containerSamsen.innerHTML = '';
            containerPhayathai.innerHTML = '';

            let samsenCompletedUnits = 0;
            let phayathaiCompletedUnits = 0;

            appState.officers.forEach(item => {
                // เช็คยอดคนมาของหน่วยนี้
                let checkedMembers = 0;
                if(item.president && appState.attendance[`${item.id}-p`]) { checkedMembers++; }
                if(item.sec1 && appState.attendance[`${item.id}-s1`]) { checkedMembers++; }
                if(item.sec2 && appState.attendance[`${item.id}-s2`]) { checkedMembers++; }

                const isAllChecked = (item.totalMembers > 0 && checkedMembers === item.totalMembers);
                
                if (isAllChecked) {
                    if (item.district === 'สามเสนใน') samsenCompletedUnits++;
                    else phayathaiCompletedUnits++;
                }

                // ตกแต่งสีพื้นหลังแถว ถ้าครบทุกคนให้เป็นสีเขียว Emerald
                const rowBg = isAllChecked 
                    ? 'bg-emerald-500 border border-emerald-600 shadow-sm z-10 scale-[1.01] rounded' 
                    : 'bg-white border-b border-gray-200 hover:bg-purple-50';

                // ตกแต่งป้ายตัวเลขหน่วย
                const unitBg = isAllChecked 
                    ? 'bg-emerald-600/50 text-white border-r border-emerald-400' 
                    : 'bg-purple-100 text-purple-800 border-r border-purple-200';

                const rowHtml = `
                    <div class="flex items-stretch transition-all duration-300 ${rowBg} flex-none min-h-[32px] lg:flex-1 lg:min-h-0 overflow-hidden">
                        <div class="w-12 sm:w-14 flex items-center justify-center font-bold text-xs shrink-0 ${unitBg}">
                            น. ${item.unit}
                        </div>
                        <div class="flex-1 flex items-center px-1.5 md:px-2 gap-1 overflow-hidden">
                            ${createCheckboxHTML(item, 'p', item.president, isAllChecked)}
                            ${createCheckboxHTML(item, 's1', item.sec1, isAllChecked)}
                            ${createCheckboxHTML(item, 's2', item.sec2, isAllChecked)}
                        </div>
                    </div>
                `;

                if (item.district === 'สามเสนใน') {
                    containerSamsen.insertAdjacentHTML('beforeend', rowHtml);
                } else {
                    containerPhayathai.insertAdjacentHTML('beforeend', rowHtml);
                }
            });

            document.getElementById('stat-samsen').textContent = `${samsenCompletedUnits}/${appState.samsenTotalUnits} หน่วย`;
            document.getElementById('stat-phayathai').textContent = `${phayathaiCompletedUnits}/${appState.phayathaiTotalUnits} หน่วย`;
        }

        function toggleAttendance(personId, isChecked) {
            if (!appState.isAdmin) return;
            
            if (isChecked) {
                appState.attendance[personId] = true;
            } else {
                delete appState.attendance[personId];
            }
            
            saveLocalStorage();
            renderAll(); // อัปเดตตารางใหม่เพื่อแสดงสีเขียวกรณีครบทุกคน
        }

        function updateStats() {
            let completedUnits = 0;
            appState.officers.forEach(item => {
                let checkedMembers = 0;
                if(item.president && appState.attendance[`${item.id}-p`]) { checkedMembers++; }
                if(item.sec1 && appState.attendance[`${item.id}-s1`]) { checkedMembers++; }
                if(item.sec2 && appState.attendance[`${item.id}-s2`]) { checkedMembers++; }
                if(item.totalMembers > 0 && checkedMembers === item.totalMembers) {
                    completedUnits++;
                }
            });
            document.getElementById('arrived-count').textContent = completedUnits;
            document.getElementById('total-count').textContent = appState.totalUnits;
        }

        /* --- ระบบ Login Modal --- */
        function showModal(id) {
            document.getElementById(`modal-${id}`).classList.remove('hidden');
            if (id === 'login') {
                document.getElementById('login-password').value = '';
                document.getElementById('login-error').classList.add('hidden');
                setTimeout(() => document.getElementById('login-password').focus(), 100);
            }
        }

        function hideModal(id) {
            document.getElementById(`modal-${id}`).classList.add('hidden');
        }

        function handleLogin(e) {
            e.preventDefault();
            const pwd = document.getElementById('login-password').value.trim();
            const err = document.getElementById('login-error');
            
            if (pwd === '0000') {
                appState.isAdmin = true;
                hideModal('login');
                updateUIState();
                renderAll(); // รีเฟรชเพื่อปลดล็อก Checkbox ให้กดได้
            } else {
                err.classList.remove('hidden');
            }
        }

        function logout() {
            appState.isAdmin = false;
            updateUIState();
            renderAll(); 
        }

        function updateUIState() {
            const btnLogin = document.getElementById('btn-login');
            const btnLogout = document.getElementById('btn-logout');
            const adminBanner = document.getElementById('admin-banner');

            if (appState.isAdmin) {
                btnLogin.classList.add('hidden');
                btnLogin.classList.remove('flex');
                btnLogout.classList.remove('hidden');
                btnLogout.classList.add('flex');
                adminBanner.classList.remove('hidden');
            } else {
                btnLogin.classList.remove('hidden');
                btnLogin.classList.add('flex');
                btnLogout.classList.add('hidden');
                btnLogout.classList.remove('flex');
                adminBanner.classList.add('hidden');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
